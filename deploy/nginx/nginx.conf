# Retirement360 gateway — routes /api to FastAPI, everything else to the frontend.
upstream backend  { server backend:8000; }
upstream frontend { server frontend:80; }

server {
    listen 80;
    server_name _;

    client_max_body_size 5m;

    # API → FastAPI. Streaming-friendly settings for the chat endpoint.
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering so the AI advisor streams token-by-token.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # FastAPI interactive docs.
    location /docs    { proxy_pass http://backend; proxy_set_header Host $host; }
    location /openapi.json { proxy_pass http://backend; proxy_set_header Host $host; }

    # Everything else → frontend SPA.
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
