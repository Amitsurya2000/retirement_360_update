apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: retire360
spec:
  replicas: 2  # Kubernetes scales this when more users join (see HPA below)
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: ghcr.io/OWNER/retire360-backend:latest  # set by CI / deploy script
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: retire360-secrets, key: DATABASE_URL }
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef: { name: retire360-secrets, key: GEMINI_API_KEY }
            - name: CORS_ORIGINS
              value: "https://retire360.example.com"
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /api/ready, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: retire360
spec:
  selector: { app: backend }
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: retire360
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
