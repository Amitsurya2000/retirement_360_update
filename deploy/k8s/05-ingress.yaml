# Requires an ingress controller (e.g. ingress-nginx) and cert-manager for TLS.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: retire360-ingress
  namespace: retire360
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"        # stream the AI chat
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["retire360.example.com"]
      secretName: retire360-tls
  rules:
    - host: retire360.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port: { number: 8000 }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port: { number: 80 }
