# Retirement360 — full local stack: Postgres + FastAPI + frontend behind Nginx.
# Usage (from repo root):
#   cp backend/.env.example backend/.env   # add your GEMINI_API_KEY
#   docker compose -f deploy/docker-compose.yml up --build
# Then open http://localhost  (Nginx gateway → frontend + /api → backend)

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: retire
      POSTGRES_PASSWORD: retire
      POSTGRES_DB: retire360
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retire -d retire360"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ../backend
    environment:
      DATABASE_URL: postgresql+psycopg://retire:retire@db:5432/retire360
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      CORS_ORIGINS: http://localhost,http://localhost:3000,http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_BASE: /api
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
